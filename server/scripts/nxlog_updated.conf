##
## NXLog Configuration for SIEM Watchtower
## Captures: Application launches, USB events, System/Security events
##

define ROOT C:\Program Files\nxlog

Moduledir %ROOT%\modules
CacheDir  %ROOT%\data
Pidfile   %ROOT%\data\nxlog.pid
SpoolDir  %ROOT%\data
LogFile   %ROOT%\data\nxlog.log

<Extension json>
    Module xm_json
</Extension>

## ─── SECURITY CHANNEL (Logins, Lockouts, Process Creation 4688) ───────────────
<Input security_events>
    Module      im_msvistalog
    SavePos     TRUE
    ReadFromLast TRUE
    Query       <QueryList>\
                    <Query Id="0">\
                        <Select Path="Security">\
                            *[System[EventID=4688 or EventID=4689 or EventID=4624 or EventID=4625\
                              or EventID=4800 or EventID=4801 or EventID=4740\
                              or EventID=4723 or EventID=4724]]\
                        </Select>\
                    </Query>\
                </QueryList>

    ## Filter 4688 to only the target apps (case-insensitive process name match)
    Exec if $EventID == 4688 { \
        if not ($NewProcessName =~ /(?i)(pgadmin4|notepad|notepad\+\+|chrome|msedge|code|codeblocks|antigravity)\.exe$/) drop(); \
    }
    Exec if $EventID == 4689 { \
        if not ($ProcessName =~ /(?i)(pgadmin4|notepad|notepad\+\+|chrome|msedge|code|codeblocks|antigravity)\.exe$/) drop(); \
    }
</Input>

## ─── SYSTEM CHANNEL (Boot, Sleep, Shutdown, USB 6416) ───────────────────────
<Input system_events>
    Module      im_msvistalog
    SavePos     TRUE
    ReadFromLast TRUE
    Query       <QueryList>\
                    <Query Id="0">\
                        <Select Path="System">\
                            *[System[EventID=6005 or EventID=6006 or EventID=6008\
                              or EventID=1074 or EventID=42 or EventID=41\
                              or EventID=1 or EventID=6416]]\
                        </Select>\
                    </Query>\
                </QueryList>
</Input>

## ─── APPLICATION CHANNEL (App Crashes EventID 1000) ─────────────────────────
<Input application_events>
    Module      im_msvistalog
    SavePos     TRUE
    ReadFromLast TRUE
    Query       <QueryList>\
                    <Query Id="0">\
                        <Select Path="Application">\
                            *[System[Level=2 and EventID=1000]]\
                        </Select>\
                    </Query>\
                </QueryList>

    ## Only capture crashes for our target apps
    Exec if not ($SourceName =~ /(?i)(pgadmin4|notepad|notepad\+\+|chrome|msedge|code|codeblocks|antigravity)\.exe$/) drop();
</Input>

## ─── USB DEVICE PLUG/UNPLUG (DriverFrameworks Channel) ─────────────────────
<Input usb_events>
    Module      im_msvistalog
    SavePos     TRUE
    ReadFromLast TRUE
    Query       <QueryList>\
                    <Query Id="0">\
                        <Select Path="Microsoft-Windows-DriverFrameworks-UserMode/Operational">\
                            *[System[EventID=2003 or EventID=2004 or EventID=2100]]\
                        </Select>\
                    </Query>\
                </QueryList>
</Input>

## ─── BATTERY / PERF (Custom PowerShell exec every 5 min) ────────────────────
<Input battery_check>
    Module      im_exec
    Command     C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe
    Arg         -ExecutionPolicy
    Arg         Bypass
    Arg         -NoProfile
    Arg         -Command
    Arg         "$b = Get-CimInstance Win32_Battery -ErrorAction SilentlyContinue; $p = Get-Process | Sort-Object CPU -Descending | Select-Object -First 3 -Property Name,CPU,Id; $res = @{EventID=9002; Battery=$b.EstimatedChargeRemaining; BatteryStatus=$b.BatteryStatus; TopApps=($p | ForEach-Object {@{Name=$_.Name;CPU=$_.CPU;Id=$_.Id}})}; $res | ConvertTo-Json -Compress"
    Schedule    Interval 300
    Exec        $EventID = 9002; to_json();
</Input>

## ─── OUTPUT to SIEM Watchtower Node Backend ─────────────────────────────────
<Output http_out>
    Module      om_http
    URL         http://127.0.0.1:5000/api/system-logs
    ContentType application/json
    Exec        to_json();
</Output>

## ─── ROUTES ──────────────────────────────────────────────────────────────────
<Route all_to_siem>
    Path security_events, system_events, application_events, usb_events, battery_check => http_out
</Route>
